<html>

<head>

    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,target-densitydpi=device-dpi">

    cursor: text;

  img,
  input,
  textarea {
    cursor: default
  }

</style>
</head>
<body style="background-color: white;" class="">
    <div id="returnHtml" style="padding-left: 10px; padding-right: 10px">HTML Viewer</div>
</body>
<script>
	if (! window.NEXACROHTML) 
	{
		window.NEXACROHTML = {};
	}
	
	var parentNexacro = null;
	var bInit = false;
	
	window.NEXACROHTML.Init = function(str)
	{
		var loopCnt = 0;
		var interval = setInterval(function() {            
		    parentNexacro = window.NEXACROWEBBROWSER;  
		if(loopCnt >= 10 || parentNexacro) {
		    bInit = true;
		    clearInterval(interval);
		    window.NEXACROHTML.FireUserNotify(str);
		  }
		    loopCnt++;
		}, 10);
	}
	
	window.NEXACROHTML.FireUserNotify = function(userdata)
	{			
		var pp = window.NEXACROWEBBROWSER;
		if (pp) 
		{		
			pp.on_fire_onusernotify(pp, userdata);
		} 
		else if (typeof nexacro == "undefined") //windows runtime
		{			
			window.document.title = userdata;
		}
		else if (nexacro) //mobile runtime 
		{ 		
			nexacro.fireUserNotify(userdata);	
		} 
	}


	function setInnerHtml(str) {
		//document.write(str);
		document.getElementById("returnHtml").innerHTML = str;

		var nHeight = document.body.offsetHeight;
		//window.NEXACROHTML.FireUserNotify("toValue:"+nHeight);
	}
	
	function getHeight() {
		var nHeight = document.body.offsetHeight;
		window.NEXACROHTML.FireUserNotify("toValue:"+nHeight);
	}

	// MutationObserver 콜백 함수
	  function onDivContentLoaded(mutationsList, observer) {
	    for (var i = 0; i < mutationsList.length; i++) {
	        var mutation = mutationsList[i];
	        if (mutation.type === 'childList') {
	          // 여기서 원하는 함수를 호출하면 됩니다.
	          var images = document.querySelectorAll('img'); // images NodeList 생성

	          for (var i = 0; i < images.length; i++) {
	            var img = images[i];
	            if (img.width > 737) {
	              img.style.width = '100%';
	              img.style.height = 'auto';
	            }
	          }

	          // div 사이즈 조절을 위한 height 전달
	          console.log(" *** MutationObserver *** ");
              window.NEXACROHTML.FireUserNotify("toValue:"+document.body.offsetHeight);

	          observer.disconnect(); // 더 이상 감시하지 않도록 옵저버 해제
	          break;
	        }
	      }
	  }

	  // MutationObserver 생성 및 div 감시 설정
	  const targetNode = document.getElementById('returnHtml');
	  const config = { childList: true }; // 자식 노드 변경 감시

	  const observer = new MutationObserver(onDivContentLoaded);
	  observer.observe(targetNode, config);

</script>
</html>
